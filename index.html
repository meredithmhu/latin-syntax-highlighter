<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Latin Syntax Highlighter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    h1 {
      font-size: 1.6rem;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
      color: #c9a84c;
    }

    p.subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 30px;
    }

    .input-area {
      width: 100%;
      max-width: 720px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      font-size: 1.05rem;
      font-family: Georgia, serif;
      background: #12122a;
      color: #e0e0e0;
      border: 1px solid #3a3a5c;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: #c9a84c; }
    input[type="text"]::placeholder { color: #555; }

    .output {
      width: 100%;
      max-width: 720px;
      margin-top: 24px;
      padding: 20px 24px;
      background: #12122a;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
    }

    .output:empty::before {
      content: "Output will appear here…";
      color: #444;
      font-style: italic;
      font-size: 0.9rem;
    }

    /* ── Latin line ── */
    .latin-line {
      font-size: 1.25rem;
      line-height: 2.1;
      letter-spacing: 0.03em;
      word-spacing: 0.1em;
      margin-bottom: 10px;
    }

    .lat-word {
      display: inline-block;
      border-radius: 3px;
      padding: 1px 4px;
      margin: 0 1px;
      cursor: default;
      transition: background 0.1s;
    }

    /* POS colours */
    .noun        { color: #6ec6f5; border-bottom: 2px solid #6ec6f5; }
    .verb        { color: #f4845f; border-bottom: 2px solid #f4845f; }
    .conjunction { color: #a8d8a8; border-bottom: 2px solid #a8d8a8; }
    .adjective   { color: #c9a0dc; border-bottom: 2px solid #c9a0dc; }
    .pronoun     { color: #f5d76e; border-bottom: 2px solid #f5d76e; }
    .adverb      { color: #f5b8c8; border-bottom: 2px solid #f5b8c8; }
    .preposition { color: #7ecfd4; border-bottom: 2px solid #7ecfd4; }
    .unknown     { color: #777; }

    /* Hover highlight on Latin word */
    .lat-word.lat-active {
      background: rgba(255, 255, 255, 0.10);
      outline: 1px solid currentColor;
      border-radius: 3px;
    }

    /* ── English line ── */
    .english-line {
      font-size: 0.95rem;
      font-style: italic;
      color: #999;
      line-height: 1.8;
      border-top: 1px solid #232340;
      padding-top: 12px;
      word-spacing: 0.08em;
    }

    .eng-chunk {
      display: inline;
      cursor: default;
      border-radius: 3px;
      padding: 1px 3px;
      transition: background 0.1s, color 0.1s;
    }

    /* Hover highlight on English chunk */
    .eng-chunk.eng-active {
      background: rgba(201, 168, 76, 0.22);
      color: #e8c86a;
      font-style: normal;
    }

    /* Unknown words in English shown dimmed */
    .eng-unknown { color: #555; }

    /* ── Legend ── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 16px 24px;
      margin-top: 20px;
      font-size: 0.8rem;
      max-width: 720px;
      justify-content: center;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 2px;
    }

    .swatch.noun        { background: #6ec6f5; }
    .swatch.verb        { background: #f4845f; }
    .swatch.conjunction { background: #a8d8a8; }
    .swatch.adjective   { background: #c9a0dc; }
    .swatch.pronoun     { background: #f5d76e; }
    .swatch.adverb      { background: #f5b8c8; }
    .swatch.preposition { background: #7ecfd4; }
    .swatch.unknown     { background: #555; }

    /* ── POS tooltip ── */
    .pos-tip {
      position: fixed;
      background: #2a2a4a;
      border: 1px solid #444;
      color: #ccc;
      font-size: 0.75rem;
      padding: 3px 9px;
      border-radius: 4px;
      pointer-events: none;
      display: none;
      z-index: 10;
    }
  </style>
</head>
<body>

  <h1>Latin Syntax Highlighter</h1>
  <p class="subtitle">Type a line of Latin — hover any word to see its English counterpart</p>

  <div class="input-area">
    <input
      type="text"
      id="latin-input"
      placeholder="e.g. Gallia est omnis divisa in partes tres"
      autocomplete="off"
      spellcheck="false"
    />
  </div>

  <div class="output" id="output"></div>

  <div class="legend">
    <div class="legend-item"><div class="swatch noun"></div>Noun</div>
    <div class="legend-item"><div class="swatch verb"></div>Verb</div>
    <div class="legend-item"><div class="swatch adjective"></div>Adjective</div>
    <div class="legend-item"><div class="swatch pronoun"></div>Pronoun</div>
    <div class="legend-item"><div class="swatch conjunction"></div>Conjunction</div>
    <div class="legend-item"><div class="swatch preposition"></div>Preposition</div>
    <div class="legend-item"><div class="swatch adverb"></div>Adverb</div>
    <div class="legend-item"><div class="swatch unknown"></div>Unknown</div>
  </div>

  <div class="pos-tip" id="pos-tip"></div>

  // ═══════════════════════════════════════════════════════════════════════════
  // Lookup & classify
  // ═══════════════════════════════════════════════════════════════════════════
  function strip(token) {
    // Remove surrounding punctuation but preserve the core word
    return token.replace(/^[.,;:!?()\[\]"'«»]+|[.,;:!?()\[\]"'«»]+$/g, "").toLowerCase();
  }

  function lookup(token) {
    const key = strip(token);
    if (!key) return null;
    return D[key] || null;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // Render
  // ═══════════════════════════════════════════════════════════════════════════
  const POS_LABEL = {
    noun:"Noun", verb:"Verb", adjective:"Adjective",
    pronoun:"Pronoun", conjunction:"Conjunction",
    preposition:"Preposition", adverb:"Adverb", unknown:"Unknown",
  };

  function render(text) {
    const output = document.getElementById("output");
    if (!text.trim()) { output.innerHTML = ""; return; }

    const tokens = text.trim().split(/\s+/);

    // Build per-token data
    const entries = tokens.map((tok, i) => {
      const entry = lookup(tok);
      return {
        i,
        latin: tok,
        pos:   entry ? entry.pos : "unknown",
        en:    entry ? entry.en  : tok,  // fallback: echo the Latin
        known: !!entry,
      };
    });

    // Latin line
    const latinHTML = entries.map(e => {
      const label = POS_LABEL[e.pos];
      return `<span class="lat-word ${e.pos}" data-idx="${e.i}" data-pos="${label}">${e.latin}</span>`;
    }).join(" ");

    // English line
    const engHTML = entries.map(e => {
      const cls = e.known ? "" : "eng-unknown";
      return `<span class="eng-chunk ${cls}" data-ref="${e.i}">${e.en}</span>`;
    }).join(" ");

    output.innerHTML = `
      <div class="latin-line">${latinHTML}</div>
      <div class="english-line">${engHTML}</div>
    `;

    wireHover(output);
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // Bidirectional hover (event-delegated, no flicker)
  // ═══════════════════════════════════════════════════════════════════════════
  const posTip = document.getElementById("pos-tip");
  let activeIdx = null;

  function setActive(output, idx) {
    if (idx === activeIdx) return;
    activeIdx = idx;
    output.querySelectorAll(".lat-active, .eng-active").forEach(el => {
      el.classList.remove("lat-active", "eng-active");
    });
    if (idx !== null) {
      output.querySelectorAll(`.lat-word[data-idx="${idx}"]`)
            .forEach(el => el.classList.add("lat-active"));
      output.querySelectorAll(`.eng-chunk[data-ref="${idx}"]`)
            .forEach(el => el.classList.add("eng-active"));
    }
  }

  function wireHover(output) {
    output.addEventListener("mousemove", e => {
      const lat = e.target.closest(".lat-word");
      const eng = e.target.closest(".eng-chunk");
      if (lat) {
        setActive(output, lat.dataset.idx);
        posTip.textContent = lat.dataset.pos;
        posTip.style.display = "block";
        posTip.style.left = (e.clientX + 12) + "px";
        posTip.style.top  = (e.clientY - 28) + "px";
      } else if (eng) {
        setActive(output, eng.dataset.ref);
        posTip.style.display = "none";
      } else {
        setActive(output, null);
        posTip.style.display = "none";
      }
    });
    output.addEventListener("mouseleave", () => {
      setActive(output, null);
      posTip.style.display = "none";
    });
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // Input
  // ═══════════════════════════════════════════════════════════════════════════
  document.getElementById("latin-input").addEventListener("input", e => {
    render(e.target.value);
  });

  // Pre-load demo
  const demo = "Gallia est omnis divisa in partes tres";
  document.getElementById("latin-input").value = demo;
  render(demo);
  </script>
