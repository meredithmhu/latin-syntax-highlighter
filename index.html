<!DOCTYPE html>
<html lang="la">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meredith's Latin Notebook</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
    }

    body {
      background:
        linear-gradient(rgba(200, 175, 148, 0.54), rgba(200, 175, 148, 0.54)),
        url('marble.jpg') center / cover no-repeat fixed;
      font-family: Georgia, "Times New Roman", serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Site title ── */
    .site-title {
      position: fixed;
      top: 14px;
      left: 0; right: 0;
      text-align: center;
      z-index: 200;
      pointer-events: none;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.1rem;
      letter-spacing: 0.18em;
      color: rgba(26, 26, 26, 0.55);
    }

    /* ── Navbar ── */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      display: flex;
      justify-content: center;
      padding-top: 46px;
      pointer-events: none;
    }

    .nav-item {
      position: relative;
      display: inline-block;
      pointer-events: auto;
    }

    .nav-label {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 18pt;
      color: #1a1a1a;
      letter-spacing: 0.04em;
      cursor: default;
      background-image: linear-gradient(currentColor, currentColor);
      background-size: 0% 1px;
      background-repeat: no-repeat;
      background-position: left bottom;
      transition: background-size 0.7s ease 0.3s;
    }

    .nav-item:hover .nav-label {
      background-size: 100% 1px;
    }

    .nav-dropdown {
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      min-width: 360px;
      padding-top: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease 0.85s;
    }

    .nav-dropdown-inner {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      padding: 6px 0;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.5);
    }

    .nav-item:hover .nav-dropdown {
      opacity: 1;
      pointer-events: auto;
    }

    .nav-dropdown-item {
      display: block;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 0.92rem;
      color: #1a1a1a;
      letter-spacing: 0.02em;
      text-decoration: none;
      white-space: nowrap;
      padding: 10px 22px;
      cursor: pointer;
      background-image: linear-gradient(currentColor, currentColor);
      background-size: 0% 1px;
      background-repeat: no-repeat;
      background-position: 22px bottom;
      transition: background-size 0.35s ease 0.05s;
    }

    .nav-dropdown-item:hover {
      background-size: calc(100% - 44px) 1px;
    }

    /* ── Scheme toggle ── */
    .scheme-toggle {
      position: fixed;
      top: 36px;
      right: 44px;
      background: none; border: none;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 0.82rem;
      color: rgba(26, 26, 26, 0.35);
      cursor: pointer;
      letter-spacing: 0.08em;
      z-index: 100; padding: 0;
      transition: color 0.25s;
    }
    .scheme-toggle:hover { color: rgba(26, 26, 26, 0.65); }

    /* ── Index content ── */
    .index-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .poem-link {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 20pt;
      color: rgba(26, 26, 26, 0.65);
      text-decoration: none;
      letter-spacing: 0.04em;
      background-image: linear-gradient(currentColor, currentColor);
      background-size: 0% 1px;
      background-repeat: no-repeat;
      background-position: left bottom;
      transition: background-size 0.5s ease 0.1s, color 0.25s;
    }

    .poem-link:hover {
      color: rgba(26, 26, 26, 0.88);
      background-size: 100% 1px;
    }

    /* ── Color modes ── */
    body.mode-light {
      background:
        linear-gradient(rgba(255, 248, 235, 0.2), rgba(255, 248, 235, 0.2)),
        url('marble.jpg') center / cover no-repeat fixed;
    }

    body.mode-dark {
      background: #1c1a17;
    }

    body.mode-dark .site-title         { color: rgba(255, 255, 255, 0.3); }
    body.mode-dark .nav-label          { color: rgba(255, 255, 255, 0.85); }
    body.mode-dark .nav-dropdown-item  { color: rgba(255, 255, 255, 0.78); }
    body.mode-dark .nav-dropdown-inner {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.12);
    }
    body.mode-dark .scheme-toggle      { color: rgba(255, 255, 255, 0.3); }
    body.mode-dark .scheme-toggle:hover{ color: rgba(255, 255, 255, 0.6); }
    body.mode-dark .poem-link          { color: rgba(255, 255, 255, 0.55); }
    body.mode-dark .poem-link:hover    { color: rgba(255, 255, 255, 0.88); }
  </style>
</head>
<body class="mode-mud">

  <div class="site-title">Meredith's Latin Notebook</div>

  <nav class="navbar">
    <div class="nav-item">
      <span class="nav-label">Latin Texts</span>
      <div class="nav-dropdown">
        <div class="nav-dropdown-inner">
          <a href="toothpaste.html" class="nav-dropdown-item">Apuleius &mdash; Apologia, Chapter 6 (The Toothpaste Poem)</a>
          <a href="perpetua.html"   class="nav-dropdown-item">Perpetua&rsquo;s Diary &mdash; Paragraphs 1 &amp; 2</a>
        </div>
      </div>
    </div>
  </nav>

  <button class="scheme-toggle" id="scheme-toggle">mud</button>

  <div class="index-content">
    <a href="toothpaste.html" class="poem-link">Toothpaste Poem</a>
  </div>

  <script>
    const schemes     = ['mode-light', 'mode-mud', 'mode-dark'];
    const schemeNames = ['light', 'mud', 'dark'];
    let schemeIdx = 1;

    const schemeBtn = document.getElementById('scheme-toggle');

    function applyScheme(idx) {
      document.body.classList.remove(...schemes);
      document.body.classList.add(schemes[idx]);
      schemeBtn.textContent = schemeNames[idx];
    }

    schemeBtn.addEventListener('click', () => {
      schemeIdx = (schemeIdx + 1) % 3;
      applyScheme(schemeIdx);
    });
  </script>

</body>
</html>
